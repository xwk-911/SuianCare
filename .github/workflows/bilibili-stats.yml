name: Bilibili Stats

on:
  schedule:
    - cron: "*/30 * * * *"   # 每 30 分钟
  workflow_dispatch:          # 也可在 Actions 页手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats & update README
        run: |
          BVID=BV1yp7h6zE6X
          json=$(curl -s \
            -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)' \
            -H 'Referer: https://www.bilibili.com' \
            "https://api.bilibili.com/x/web-interface/view?bvid=${BVID}")

          code=$(echo "$json" | jq -r '.code')
          if [ "$code" != "0" ]; then
            echo "Bilibili API 返回 code=$code（可能被风控），本次跳过更新"
            echo "$json" | head -c 300
            exit 0
          fi

          view=$(echo "$json" | jq -r '.data.stat.view')
          like=$(echo "$json" | jq -r '.data.stat.like')
          coin=$(echo "$json" | jq -r '.data.stat.coin')

          export BADGES="![播放](https://img.shields.io/badge/播放-${view}-00a1d6?logo=bilibili&logoColor=white) ![点赞](https://img.shields.io/badge/点赞-${like}-fb7299?logo=bilibili&logoColor=white) ![投币](https://img.shields.io/badge/投币-${coin}-f9a825?logo=bilibili&logoColor=white)"

          python3 - <<'PY'
          import os, re
          badges = os.environ["BADGES"]
          path = "README.md"
          s = open(path, encoding="utf-8").read()
          new = re.sub(
              r"(<!-- bilibili-stats:start -->).*?(<!-- bilibili-stats:end -->)",
              lambda m: f"{m.group(1)}\n{badges}\n{m.group(2)}",
              s, flags=re.S,
          )
          open(path, "w", encoding="utf-8").write(new)
          PY

          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "chore: 更新 Bilibili 数据 (播放 ${view} / 点赞 ${like} / 投币 ${coin})"
            git push
          else
            echo "数据无变化，无需提交"
          fi
